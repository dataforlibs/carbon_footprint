<title>Countries' Lifepaths</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f8f8; }

#header { text-align: center; padding: 14px 0 4px; }
#header h1 { font-size: 1.45rem; font-weight: bold; color: #222; }
#header p  { font-size: 0.8rem; color: #777; margin-top: 3px; }

#controls {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  padding: 7px 18px; background: #fff; border-bottom: 1px solid #e0e0e0;
}
.btn {
  padding: 4px 15px; border-radius: 18px; border: 2px solid #e74c3c;
  background: white; color: #e74c3c; cursor: pointer; font-size: 0.8rem;
  font-weight: 600; transition: all 0.13s;
}
.btn.active, .btn:hover { background: #e74c3c; color: white; }
#search {
  padding: 4px 12px; border-radius: 18px; border: 2px solid #e74c3c;
  font-size: 0.8rem; outline: none; width: 190px;
}
#count { font-size: 0.78rem; color: #aaa; margin-left: auto; }

#legend {
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  padding: 5px 18px 6px; background: #fafafa; border-bottom: 1px solid #eee;
}
.leg { display: flex; align-items: center; gap: 5px; font-size: 0.79rem; cursor: pointer; user-select: none; }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; }
.leg-off { opacity: 0.28; }
.leg-reset { font-size: 0.74rem; color: #bbb; cursor: pointer; margin-left: 4px; }
.leg-reset:hover { color: #888; }

#wrap { position: relative; }
svg { display: block; }

.tip {
  position: absolute; background: rgba(12,12,12,0.87); color: #fff;
  padding: 8px 11px; border-radius: 8px; font-size: 0.75rem;
  pointer-events: none; display: none; max-width: 215px;
  line-height: 1.6; z-index: 99; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.tip strong { font-size: 0.84rem; display: block; margin-bottom: 2px; }
.tip .ph { font-weight: 600; }
</style>
</head>

// ── Phase colours ─────────────────────────────────────────────────────────
const PHASE = {
  green: { label:'Acceleration', hex:'#27ae60' },
  blue:  { label:'Inflection',   hex:'#2980b9' },
  red:   { label:'Deceleration', hex:'#e74c3c' },
  black: { label:'Deactivated',  hex:'#2c3e50' },
};

// ── State ──────────────────────────────────────────────────────────────────
let activePhases = new Set(['green','blue','red','black']);
let searchTerm   = '';
let viewMode     = 'traj';
let highlighted  = null; // clicked country name

// ── Layout ─────────────────────────────────────────────────────────────────
const M = { top:80, right:70, bottom:58, left:68 };
let W, H, IW, IH;

// ── Scales (simple linear) ─────────────────────────────────────────────────
// x: Date → px    (2006 left, 2030 right)
// y: ln(k) → px   INVERTED: small ln(k) = small px = TOP of chart
const X0 = new Date(2006,0,1).getTime();
const X1 = new Date(2030,6,1).getTime();

// y domain from data
let Y0, Y1; // Y0=min(lnk)~2.4  Y1=max(lnk)~8.6

function xpx(dateStr) {
  const t = new Date(dateStr).getTime();
  return (t - X0) / (X1 - X0) * IW;
}
function ypx(lnk) {
  // invert: small lnk → 0 (top), large lnk → IH (bottom)
  return (lnk - Y0) / (Y1 - Y0) * IH;
}
function rSize(o) {
  return Math.max(2.5, Math.min(30, Math.pow(o, 0.45) * 2.2));
}

// ── Parsed countries ───────────────────────────────────────────────────────
let countries;

function parse() {
  // collect y range
  const allY = Object.values(RAW).flat().map(e=>e.y);
  Y0 = Math.min(...allY) * 0.98;
  Y1 = Math.max(...allY) * 1.02;

  countries = Object.entries(RAW).map(([name, entries]) => {
    const pts = entries
      .filter(e => e.y != null && e.o > 0)
      .map(e => ({ x:e.x, y:e.y, o:e.o, col:e.color, yr:e.yr||e.x }))
      .sort((a,b) => new Date(a.x)-new Date(b.x));
    const last = pts[pts.length-1] || {};
    return { name, pts, fc: last.col||'black', fo: last.o||1 };
  }).filter(c => c.pts.length > 0);
}

function top20Set() {
  return new Set(
    [...countries].sort((a,b)=>b.fo-a.fo).slice(0,20).map(c=>c.name)
  );
}

function visible() {
  if (searchTerm) {
    // Search overrides phase filter — always find the country by name
    return countries.filter(c =>
      c.name.toLowerCase().includes(searchTerm.toLowerCase())
    );
  }
  return countries.filter(c => activePhases.has(c.fc));
}

// ── SVG helpers ────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}

let svg, gGrid, gLines, gDots, gLabels;

function initSVG() {
  const wrap = document.getElementById('wrap');
  W  = window.innerWidth;
  H  = Math.max(520, window.innerHeight - 190);
  IW = W - M.left - M.right;
  IH = H - M.top  - M.bottom;

  svg = document.getElementById('chart');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.innerHTML = '';

  const defs = svgEl('defs',{},svg);
  const cp   = svgEl('clipPath',{id:'cp'},defs);
  svgEl('rect',{x:-10,y:-80,width:IW+20,height:IH+80},cp);

  const g = svgEl('g',{transform:`translate(${M.left},${M.top})`},svg);
  gGrid   = svgEl('g',{},g);
  gLines  = svgEl('g',{'clip-path':'url(#cp)'},g);
  gDots   = svgEl('g',{'clip-path':'url(#cp)'},g);
  gLabels = svgEl('g',{},g);
}

function drawAxes() {
  gGrid.innerHTML = '';

  // Plot background
  svgEl('rect',{x:0,y:0,width:IW,height:IH,fill:'#f8f8f8',stroke:'#ccc'},gGrid);

  // Y grid lines & ticks (inverted: small lnk at top)
  for (let v=1; v<=9; v++) {
    const py = ypx(v);
    if (py < 0 || py > IH) continue;
    const gg = svgEl('g',{transform:`translate(0,${py})`},gGrid);
    svgEl('line',{x1:0,y1:0,x2:IW,y2:0,stroke:'#ddd','stroke-dasharray':'3,3'},gg);
    const t = svgEl('text',{x:-7,y:4,'text-anchor':'end','font-size':'11',fill:'#777'},gg);
    t.textContent = v;
  }

  // X grid lines & ticks
  for (let yr=2006; yr<=2030; yr+=2) {
    const px = xpx(`${yr}-01-01`);
    if (px < 0 || px > IW+1) continue;
    const gg = svgEl('g',{transform:`translate(${px},0)`},gGrid);
    svgEl('line',{x1:0,y1:0,x2:0,y2:IH,stroke:'#ddd','stroke-dasharray':'3,3'},gg);
    const gt = svgEl('g',{transform:`translate(${px},${IH})`},gGrid);
    svgEl('line',{x1:0,y1:0,x2:0,y2:5,stroke:'#999'},gt);
    const t = svgEl('text',{x:0,y:18,'text-anchor':'middle','font-size':'11',fill:'#666'},gt);
    t.textContent = yr;
  }

  // Axis border
  svgEl('rect',{x:0,y:0,width:IW,height:IH,fill:'none',stroke:'#bbb'},gGrid);

  // Axis labels
  const xl = svgEl('text',{
    x:IW/2, y:IH+46,
    'text-anchor':'middle','font-size':'13','font-weight':'600',fill:'#444'
  },gGrid);
  xl.textContent = 'Projected inflection date  t_inf';

  const yl = svgEl('text',{
    transform:`translate(-50,${IH/2}) rotate(-90)`,
    'text-anchor':'middle','font-size':'13','font-weight':'600',fill:'#444'
  },gGrid);
  yl.textContent = 'ln(k)  ↑ higher growth intensity';
}

function drawData() {
  gLines.innerHTML = '';
  gDots.innerHTML  = '';
  gLabels.innerHTML = '';

  const T20    = top20Set();
  const vis    = visible();
  const visSet = new Set(vis.map(c=>c.name));
  const hasHL  = highlighted !== null;

  // Background (non-visible or dimmed) — faint grey
  if (viewMode === 'traj') {
    for (const c of countries) {
      const isDimmed = !visSet.has(c.name) || (hasHL && c.name !== highlighted);
      if (isDimmed) drawTraj(c, false, 0.05);
    }
  }

  // Visible countries — dim all if something is highlighted, except the highlighted one
  for (const c of vis) {
    if (hasHL && c.name !== highlighted) continue; // already drawn dimmed above
    const top = T20.has(c.name);
    if (viewMode === 'traj') drawTraj(c, true, 1.0, true);  // highlighted = full opacity
    else                     drawFinal(c, top, true);
  }

  // If nothing highlighted, draw ghosts first then visible on top
  if (!hasHL) {
    gLines.innerHTML = '';
    gDots.innerHTML  = '';
    // Pass 1: ghost lines for all non-visible countries
    for (const c of countries) {
      if (!visSet.has(c.name)) {
        if (viewMode === 'traj') drawTraj(c, false, 0.05);
        else drawFinal(c, false, false);
      }
    }
    // Pass 2: visible countries drawn last → always rendered on top
    for (const c of vis) {
      const top = T20.has(c.name);
      if (viewMode === 'traj') drawTraj(c, top, top ? 0.85 : 0.22, false);
      else                     drawFinal(c, top, false);
    }
  }

  // Labels — show all top20 visible, or just highlighted
  for (const c of vis) {
    const isHL = hasHL && c.name === highlighted;
    if (!T20.has(c.name) && !isHL) continue;
    if (hasHL && !isHL) continue;
    const last = c.pts[c.pts.length-1];
    const px = xpx(last.x), py = ypx(last.y);
    const col = PHASE[last.col]?.hex || '#555';
    const t = svgEl('text',{
      x:px+7, y:py+3,
      'font-size': isHL ? '11' : '9',
      'font-weight':'bold',
      fill:col,'pointer-events':'none'
    },gLabels);
    t.textContent = c.name;
  }

  document.getElementById('count').textContent =
    `Showing ${vis.length} of ${countries.length} countries`;
}

function drawTraj(c, isTop, alpha, hl=false) {
  const col = PHASE[c.fc]?.hex || '#888';
  if (c.pts.length >= 2) {
    const pts = c.pts.map(p => `${xpx(p.x).toFixed(1)},${ypx(p.y).toFixed(1)}`).join(' ');
    svgEl('polyline',{
      points:pts, fill:'none', stroke: hl ? col : (alpha < 0.1 ? '#bbb' : col),
      'stroke-width': hl ? 3 : (isTop ? 1.8 : 0.5),
      opacity: alpha,
      'stroke-linejoin':'round','stroke-linecap':'round'
    }, gLines);
  }
  for (let i=0; i<c.pts.length; i++) {
    const p = c.pts[i];
    const isFinal = i === c.pts.length-1;
    const dc = PHASE[p.col]?.hex || '#888';
    const r  = rSize(p.o) * (isFinal ? (hl ? 2.4 : 1.9) : 0.85) * (isTop || hl ? 1.3 : 1.0);
    const dot = svgEl('circle',{
      cx: xpx(p.x), cy: ypx(p.y), r,
      fill: hl ? dc : (alpha < 0.1 ? '#ccc' : dc),
      opacity: hl ? 0.85 : 0.5,
      stroke: hl ? 'black' : (alpha < 0.1 ? 'none' : 'black'),
      'stroke-width': hl ? (isFinal ? 2 : 1) : (isFinal ? 1.2 : 0.5),
      cursor:'pointer'
    }, gDots);
    dot.addEventListener('mouseenter', ev => showTip(ev, c, p, i));
    dot.addEventListener('mouseleave', hideTip);
    dot.addEventListener('click', () => clickCountry(c.name));
  }
}

function drawFinal(c, isTop, hl=false) {
  const last = c.pts[c.pts.length-1];
  const col  = PHASE[last.col]?.hex || '#888';
  const r    = rSize(last.o) * (hl ? 2.8 : (isTop ? 2.4 : 1.5));
  const dot  = svgEl('circle',{
    cx:xpx(last.x), cy:ypx(last.y), r,
    fill:col, opacity: hl ? 0.9 : 0.5,
    stroke:'black','stroke-width': hl ? 2 : 1.2,
    cursor:'pointer'
  }, gDots);
  dot.addEventListener('mouseenter', ev => showTip(ev, c, last, c.pts.length-1));
  dot.addEventListener('mouseleave', hideTip);
  dot.addEventListener('click', () => clickCountry(c.name));
}

function clickCountry(name) {
  highlighted = (highlighted === name) ? null : name;
  render();
}

function showTip(ev, c, p, idx) {
  const tip = document.getElementById('tip');
  const ph  = PHASE[p.col]?.label || p.col;
  tip.innerHTML = `
    <b>${c.name}</b><br>
    Window: ${p.yr}<br>
    Proj. inflection: ${p.x}<br>
    ln(k): ${p.y.toFixed(3)}<br>
    Publications: ${Math.round(p.o)}<br>
    Phase: <span style="color:${PHASE[p.col]?.hex}">${ph}</span><br>
    Snapshot ${idx+1}/${c.pts.length}`;
  tip.style.display = 'block';
  moveTip(ev);
}
function moveTip(ev) {
  const tip  = document.getElementById('tip');
  const rect = document.getElementById('wrap').getBoundingClientRect();
  let tx = ev.clientX - rect.left + 14;
  let ty = ev.clientY - rect.top  - 10;
  if (tx + 220 > rect.width) tx -= 235;
  tip.style.left = tx+'px'; tip.style.top = ty+'px';
}
function hideTip() { document.getElementById('tip').style.display='none'; }

// ── Legend ─────────────────────────────────────────────────────────────────
function buildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  for (const [col, {label,hex}] of Object.entries(PHASE)) {
    const item = document.createElement('div');
    item.className = 'leg';
    item.className = 'leg' + (activePhases.has(col) ? '' : ' leg-off');
    item.innerHTML = `<div class="leg-dot" style="background:${hex}"></div><span>${label}</span>`;
    item.onclick = () => {
      if (activePhases.has(col)) { if (activePhases.size>1) activePhases.delete(col); }
      else activePhases.add(col);
      buildLegend(); render();
    };
    leg.appendChild(item);
  }
  const rst = document.createElement('div');
  rst.className = 'leg-reset';
  rst.textContent = 'Reset filters';
  rst.onclick = () => {
    activePhases = new Set(['green','blue','red','black']);
    searchTerm = ''; document.getElementById('search').value='';
    buildLegend(); render();
  };
  leg.appendChild(rst);
}

// ── Controls ───────────────────────────────────────────────────────────────
function setView(v) {
  viewMode = v;
  document.getElementById('btn-traj').classList.toggle('active',  v==='traj');
  document.getElementById('btn-final').classList.toggle('active', v==='final');
  render();
}
function onSearch(val) { searchTerm=val; render(); }
function render() { drawData(); }

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  parse();
  initSVG();
  drawAxes();
  buildLegend();
  drawData();
}
window.addEventListener('resize', ()=>{ initSVG(); drawAxes(); drawData(); });
init();
</script>
